<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #181b21;
            --bg-message-user: #2b5c92;
            --bg-message-ai: #22262e;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --accent: #3a7bd5;
            --danger: #cf4545;
            --border: #333;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Inter, sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 260px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 10px;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .new-chat-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: #2a62b3; }

        #history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-item {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: 0.2s;
        }
        .history-item:hover { background-color: #333; }
        .history-item.active { background-color: #2b303b; border-left: 3px solid var(--accent); }

        .admin-controls {
            border-top: 1px solid var(--border);
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .admin-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .admin-btn:hover { background: #252525; color: #fff; }
        .admin-btn.danger:hover { background: rgba(207, 69, 69, 0.2); color: var(--danger); border-color: var(--danger); }

        /* --- MAIN CHAT AREA --- */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 1rem;
            position: relative;
        }
        
        .message.user {
            align-self: flex-end;
            background-color: var(--bg-message-user);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--bg-message-ai);
            color: #ddd;
            border-bottom-left-radius: 2px;
        }

        /* Markdown Styles */
        .message p { margin-top: 0; }
        .message p:last-child { margin-bottom: 0; }
        .message pre { 
            background: #111; 
            padding: 15px; 
            border-radius: 6px; 
            overflow-x: auto; 
            border: 1px solid #444;
        }
        .message code { font-family: 'Consolas', monospace; font-size: 0.9em; }

        /* --- INPUT AREA --- */
        #input-container {
            background: var(--bg-panel);
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .input-box-wrapper {
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            max-height: 200px;
            padding: 8px 0;
            outline: none;
            overflow-y: hidden; /* Hides scrollbar until max-height */
        }

        #send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            margin-bottom: 4px;
        }
        #send-btn:hover { background: #2a62b3; }
        #send-btn:disabled { background: #444; cursor: not-allowed; }

    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h3>Felix AI</h3>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">
            <i class="ph ph-plus-circle"></i> New Chat
        </button>
        
        <div id="history-list">
            </div>

        <div class="admin-controls">
            <button class="admin-btn" onclick="openDebug()">
                <i class="ph ph-brain" style="color: #d4a017;"></i> Internals
            </button>
            <button class="admin-btn" onclick="triggerScribe()">
                <i class="ph ph-pencil-simple"></i> Run Scribe
            </button>
            <button class="admin-btn" onclick="deleteCurrentChat()">
                <i class="ph ph-trash"></i> Delete Chat
            </button>
            <button class="admin-btn" onclick="deleteAllChats()">
                <i class="ph ph-trash-simple"></i> Delete All Chats
            </button>
            <button class="admin-btn danger" onclick="systemPurge()">
                <i class="ph ph-skull"></i> SYSTEM PURGE
            </button>
        </div>
    </div>

    <div id="main-chat">
        <div id="messages">
            <div class="message assistant">
                Hello. I am Felix. I am ready to collaborate.
            </div>
        </div>
        
        <div id="input-container">
            <div class="input-box-wrapper">
                <textarea id="userInput" rows="1" placeholder="Message Felix..." autofocus></textarea>
                <button id="send-btn" onclick="sendMessage()">
                    <i class="ph ph-paper-plane-right" style="font-size: 1.2rem;"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null; // Tracks the ID for deletion purposes

        // --- 1. Initialization ---
        document.addEventListener("DOMContentLoaded", () => {
            fetchHistory();
            setupAutoResize();
        });

        // --- 2. Markdown Setup ---
        marked.setOptions({
            highlight: function(code, lang) {
                const language = highlight.getLanguage(lang) ? lang : 'plaintext';
                return highlight.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        // --- 3. Core Chat Logic ---
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('send-btn');
            const messagesDiv = document.getElementById('messages');
            const text = input.value.trim();

            if (!text) return;

            // UI Updates
            input.value = '';
            input.style.height = 'auto'; // Reset height
            sendBtn.disabled = true;

            // Add User Message
            appendMessage('user', text);

            // Create AI Container
            const aiId = 'ai-' + Date.now();
            const aiBubble = document.createElement('div');
            aiBubble.className = 'message assistant';
            aiBubble.id = aiId;
            aiBubble.innerHTML = '<span class="typing">...</span>';
            messagesDiv.appendChild(aiBubble);
            scrollToBottom();

            // Stream Handling
            try {
                const response = await fetch('/chat/api/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });

                if (!response.ok) throw new Error("Network error");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let rawMarkdown = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, {stream: true});
                    rawMarkdown += chunk;
                    
                    // Live Markdown Rendering
                    aiBubble.innerHTML = marked.parse(rawMarkdown);
                    scrollToBottom();
                }
                
                // Refresh history list if this was a new chat
                if (!currentSessionId) fetchHistory();

            } catch (err) {
                aiBubble.textContent = "Error: " + err.message;
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // --- 4. Helper Functions ---
        
        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            // Use marked for user messages too, or just textContent for safety
            div.innerHTML = role === 'user' ? text.replace(/\n/g, '<br>') : marked.parse(text);
            document.getElementById('messages').appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const m = document.getElementById('messages');
            m.scrollTop = m.scrollHeight;
        }

        function setupAutoResize() {
            const tx = document.getElementById('userInput');
            tx.addEventListener("input", function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + "px";
            });
            tx.addEventListener("keypress", function(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        // --- 5. History & Admin API ---

        async function fetchHistory() {
            const res = await fetch('/api/history/');
            const data = await res.json();
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            data.chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `history-item ${chat.id === currentSessionId ? 'active' : ''}`;
                item.textContent = chat.title || `Chat ${chat.id}`;
                item.onclick = () => loadChat(chat.id);
                list.appendChild(item);
            });
        }

        async function loadChat(id) {
            const res = await fetch(`/api/history/${id}/`);
            const data = await res.json();
            
            currentSessionId = data.session_id;
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            data.messages.forEach(msg => {
                // Ensure correct role mapping 'assistant' vs 'ai'
                const role = msg.role === 'assistant' ? 'assistant' : 'user';
                appendMessage(role, msg.content);
            });
            
            // Re-fetch history to update the 'active' highlight
            fetchHistory();
        }

        async function startNewChat() {
            await fetch('/api/new-chat/');
            currentSessionId = null;
            document.getElementById('messages').innerHTML = 
                '<div class="message assistant">Starting new session...</div>';
            fetchHistory(); // Removes active highlight
        }

        async function triggerScribe() {
            if (!confirm("Run Scribe consolidation now? (Manual Trigger)")) return;
            
            const res = await fetch('/system/trigger-scribe/', { method: 'POST' });
            const data = await res.json();
            
            alert("Scribe Status:\n" + data.result);
        }

        function openDebug() {
            // Opens in a new tab/window
            if (!currentSessionId) {
                window.open(`/chat/debug/`, '_blank');
                return;
            }
            window.open(`/chat/debug/${currentSessionId}/`, '_blank');
        }

        async function deleteCurrentChat() {
            if (!currentSessionId) return alert("No active chat to delete.");
            if (!confirm("Delete this chat?")) return;

            await fetch(`/chat/delete/${currentSessionId}/`, { method: 'DELETE' });
            startNewChat();
        }

        async function deleteAllChats() {
            if (!confirm("Delete ALL chat history?")) return;
            await fetch('/chat/delete-all/', { method: 'POST' });
            startNewChat();
        }

        async function systemPurge() {
            const check = prompt("Type 'DELETE' to confirm full system wipe (Memories & Chats).");
            if (check !== 'DELETE') return;
            
            await fetch('/system/purge/', { method: 'POST' });
            location.reload();
        }
    </script>
</body>
</html>
